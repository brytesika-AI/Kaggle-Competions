name: FleetMind CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pandas numpy fastapi pydantic uvicorn httpx redis pip-licenses

      - name: Run Ruff (Linter and Formatter)
        run: |
          ruff check .
          ruff format --check .

      - name: Run License Audit
        run: |
          bash scripts/license_audit.sh

      - name: Run Unit Tests
        run: |
          pytest
