version: '3.8'

services:
  # 1. Redis Vector Database (RediSearch enabled)
  redis-vector-db:
    image: redis/redis-stack:7.2.0-v9
    container_name: fleetmind-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    environment:
      - REDIS_ARGS=--save ""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. Text Embeddings Inference (TEI) CPU Service
  tei-embedding-service:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: fleetmind-tei-embedding
    ports:
      - "8080:80"
    volumes:
      - tei_data:/data
    environment:
      - PORT=80
      - MODEL_ID=BAAI/bge-small-en-v1.5
    command: --model-id BAAI/bge-small-en-v1.5 --port 80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Text Embeddings Inference (TEI) Reranker CPU Service
  tei-reranking-service:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: fleetmind-tei-reranker
    ports:
      - "8081:80"
    volumes:
      - tei_data:/data
    environment:
      - PORT=80
      - MODEL_ID=BAAI/bge-reranker-base
    command: --model-id BAAI/bge-reranker-base --port 80
    profiles:
      - default
      - ovms
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. llama.cpp Server (CPU-only GGUF LLM serving)
  llm-service-llamacpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: fleetmind-llm-llamacpp
    ports:
      - "8000:8080"
    volumes:
      - ./data/models:/models
    command: -m /models/qwen2.5-3b-instruct-q4_k_m.gguf -c 4096 --host 0.0.0.0 --port 8080
    profiles:
      - default
      - lite
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 5. OpenVINO Model Server (OVMS) - Optimized Intel Profile
  llm-service-ovms:
    image: openvino/model_server:2024.1
    container_name: fleetmind-llm-ovms
    ports:
      - "8000:8000"
    volumes:
      - ./data/models/ovms:/models
    command: --model_path /models/qwen2.5-3b-instruct-int8 --model_name qwen --port 8000 --rest_port 8000 --plugin_config "{\"CPU_THROUGHPUT_STREAMS\": \"CPU_THROUGHPUT_AUTO\"}"
    profiles:
      - ovms
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models/qwen"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 6. FleetMind Gateway & UI Megaservice
  fleetmind-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleetmind-gateway
    ports:
      - "8888:8888"
    environment:
      - REDIS_HOST=redis-vector-db
      - REDIS_PORT=6379
      - EMBEDDING_HOST=tei-embedding-service
      - EMBEDDING_PORT=80
      - RERANKER_HOST=tei-reranking-service
      - RERANKER_PORT=80
      - LLM_HOST=llm-service-llamacpp
      - LLM_PORT=8080
      - LLM_SERVICE_TYPE=llamacpp
    depends_on:
      - redis-vector-db
      - tei-embedding-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  tei_data:
